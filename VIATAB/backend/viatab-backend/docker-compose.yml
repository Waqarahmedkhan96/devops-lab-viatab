services:
  db:
    image: postgres:16
    container_name: viatab-pgsql-container
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - db:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=viatab_db
      - POSTGRES_USER=viatab_user
      - POSTGRES_PASSWORD=admin

  backend:
    image: viatab-backend:latest
    build:
      context: ./
    container_name: viatab-backend-container
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/viatab_db
      - SPRING_DATASOURCE_USERNAME=viatab_user
      - SPRING_DATASOURCE_PASSWORD=admin
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update

volumes:
  db:
    driver: local